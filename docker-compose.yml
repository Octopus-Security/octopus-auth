version: '3.8'

services:
  octopus-auth:
    build:
      context: .
      args:
        - NPM_TOKEN
    container_name: octopus-auth
    restart: unless-stopped
    ports:
      - "3003:3002"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-octopus-shared-secret-change-in-production}
      - PORT=3002
      - REQUIRE_2FA=${REQUIRE_2FA:-true}
      - INTERNAL_SECRET=${INTERNAL_SECRET:-}
    volumes:
      - auth_data:/app/data
    networks:
      - octopus_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  octopus_network:
    external: true

volumes:
  auth_data:
